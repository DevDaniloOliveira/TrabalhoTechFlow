name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Testes e qualidade
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Verificar qualidade do código (flake8)
        run: flake8 src tests --max-line-length=100 --extend-ignore=E501

      - name: Executar Pytest
        run: pytest -q
