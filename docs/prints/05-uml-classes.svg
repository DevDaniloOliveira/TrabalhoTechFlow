<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560">
  <rect width="980" height="560" fill="#f7fafb"/>
  <text x="490" y="34" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#15252c">Diagrama de Classes  TechFlow</text>

  <!-- TaskStatus -->
  <g>
    <rect x="40" y="70" width="200" height="130" rx="8" fill="#fff" stroke="#15252c" stroke-width="1.5"/>
    <rect x="40" y="70" width="200" height="28" rx="8" fill="#d9ecec"/>
    <rect x="40" y="84" width="200" height="14" fill="#d9ecec"/>
    <text x="140" y="90" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#15252c">«enumeration»</text>
    <text x="140" y="112" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#15252c">TaskStatus</text>
    <line x1="40" y1="122" x2="240" y2="122" stroke="#15252c"/>
    <text x="52" y="145" font-family="Consolas, monospace" font-size="12" fill="#15252c">TODO</text>
    <text x="52" y="165" font-family="Consolas, monospace" font-size="12" fill="#15252c">IN_PROGRESS</text>
    <text x="52" y="185" font-family="Consolas, monospace" font-size="12" fill="#15252c">DONE</text>
  </g>

  <!-- TaskPriority -->
  <g>
    <rect x="40" y="240" width="200" height="150" rx="8" fill="#fff" stroke="#15252c" stroke-width="1.5"/>
    <rect x="40" y="240" width="200" height="28" rx="8" fill="#d9ecec"/>
    <rect x="40" y="254" width="200" height="14" fill="#d9ecec"/>
    <text x="140" y="260" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#15252c">«enumeration»</text>
    <text x="140" y="282" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#15252c">TaskPriority</text>
    <line x1="40" y1="292" x2="240" y2="292" stroke="#15252c"/>
    <text x="52" y="315" font-family="Consolas, monospace" font-size="12" fill="#15252c">BAIXA</text>
    <text x="52" y="335" font-family="Consolas, monospace" font-size="12" fill="#15252c">MEDIA</text>
    <text x="52" y="355" font-family="Consolas, monospace" font-size="12" fill="#15252c">ALTA</text>
    <line x1="40" y1="365" x2="240" y2="365" stroke="#15252c"/>
    <text x="52" y="382" font-family="Consolas, monospace" font-size="12" fill="#15252c">+ rank: int</text>
  </g>

  <!-- Task -->
  <g>
    <rect x="340" y="120" width="240" height="220" rx="8" fill="#fff" stroke="#0d6e6e" stroke-width="2"/>
    <rect x="340" y="120" width="240" height="32" rx="8" fill="#0d6e6e"/>
    <rect x="340" y="140" width="240" height="12" fill="#0d6e6e"/>
    <text x="460" y="142" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#fff">Task</text>
    <line x1="340" y1="152" x2="580" y2="152" stroke="#0d6e6e"/>
    <text x="352" y="175" font-family="Consolas, monospace" font-size="12" fill="#15252c">+ id: str</text>
    <text x="352" y="195" font-family="Consolas, monospace" font-size="12" fill="#15252c">+ title: str</text>
    <text x="352" y="215" font-family="Consolas, monospace" font-size="12" fill="#15252c">+ description: str</text>
    <text x="352" y="235" font-family="Consolas, monospace" font-size="12" fill="#15252c">+ status: TaskStatus</text>
    <text x="352" y="255" font-family="Consolas, monospace" font-size="12" fill="#15252c">+ priority: TaskPriority</text>
    <line x1="340" y1="268" x2="580" y2="268" stroke="#0d6e6e"/>
    <text x="352" y="292" font-family="Consolas, monospace" font-size="12" fill="#15252c">+ to_dict()</text>
    <text x="352" y="312" font-family="Consolas, monospace" font-size="12" fill="#15252c">+ from_dict()</text>
  </g>

  <!-- TaskStorage -->
  <g>
    <rect x="680" y="80" width="260" height="220" rx="8" fill="#fff" stroke="#15252c" stroke-width="1.5"/>
    <rect x="680" y="80" width="260" height="32" rx="8" fill="#15252c"/>
    <rect x="680" y="100" width="260" height="12" fill="#15252c"/>
    <text x="810" y="102" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#fff">TaskStorage</text>
    <line x1="680" y1="112" x2="940" y2="112" stroke="#15252c"/>
    <text x="692" y="135" font-family="Consolas, monospace" font-size="12" fill="#15252c">- path: Path</text>
    <text x="692" y="155" font-family="Consolas, monospace" font-size="12" fill="#15252c">- _tasks: dict</text>
    <line x1="680" y1="168" x2="940" y2="168" stroke="#15252c"/>
    <text x="692" y="192" font-family="Consolas, monospace" font-size="12" fill="#15252c">+ list_all()</text>
    <text x="692" y="212" font-family="Consolas, monospace" font-size="12" fill="#15252c">+ get(id)</text>
    <text x="692" y="232" font-family="Consolas, monospace" font-size="12" fill="#15252c">+ create(...)</text>
    <text x="692" y="252" font-family="Consolas, monospace" font-size="12" fill="#15252c">+ update(...)</text>
    <text x="692" y="272" font-family="Consolas, monospace" font-size="12" fill="#15252c">+ delete(id)</text>
  </g>

  <!-- FlaskApp -->
  <g>
    <rect x="700" y="360" width="220" height="120" rx="8" fill="#fff" stroke="#15252c" stroke-width="1.5"/>
    <rect x="700" y="360" width="220" height="32" rx="8" fill="#15252c"/>
    <rect x="700" y="380" width="220" height="12" fill="#15252c"/>
    <text x="810" y="382" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#fff">FlaskApp</text>
    <line x1="700" y1="392" x2="920" y2="392" stroke="#15252c"/>
    <text x="712" y="420" font-family="Consolas, monospace" font-size="12" fill="#15252c">+ create_app()</text>
    <text x="712" y="445" font-family="Consolas, monospace" font-size="12" fill="#15252c">+ rotas HTML/JSON</text>
  </g>

  <!-- Associations -->
  <line x1="240" y1="135" x2="340" y2="180" stroke="#5a6f78" stroke-width="1.5"/>
  <text x="270" y="145" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5a6f78">status</text>
  <line x1="240" y1="300" x2="340" y2="260" stroke="#5a6f78" stroke-width="1.5"/>
  <text x="255" y="290" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5a6f78">priority</text>
  <line x1="580" y1="200" x2="680" y2="180" stroke="#5a6f78" stroke-width="1.5"/>
  <text x="600" y="175" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5a6f78">1..*</text>
  <line x1="810" y1="300" x2="810" y2="360" stroke="#5a6f78" stroke-width="1.5"/>
</svg>
